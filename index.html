<style>
  :root{
    --cream:#EDE6D6; --cream-deep:#E3DAC4; --bone:#F7F2E7;
    --ink:#2A2620; --ink-soft:#5A5247; --ink-faint:#8B8275;
    --sage:#6B7F5A; --sage-deep:#4F6042; --sage-soft:#D4DCC9;
    --terra:#B85C3D; --terra-soft:#F4DCD0; --gold:#C8A055; --gold-soft:rgba(200,160,85,0.18);
    --line:rgba(42,38,32,0.08); --line-mid:rgba(42,38,32,0.14);
    --serif:"Fraunces",Georgia,serif; --sans:"DM Sans",system-ui,-apple-system,sans-serif;
    --shadow:0 18px 50px -22px rgba(42,38,32,0.40);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);color:var(--ink);min-height:100vh;min-height:100dvh;
    background:radial-gradient(at 12% 8%, rgba(212,220,201,.55) 0, transparent 50%),
               radial-gradient(at 88% 92%, rgba(244,220,208,.45) 0, transparent 52%), var(--cream);
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;}
  @media(min-width:520px){ .wrap{box-shadow:var(--shadow);border-left:1px solid var(--line);border-right:1px solid var(--line);} }
  .center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 24px;}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px;}
  .brand .mark{width:34px;height:34px;border-radius:999px;background:var(--sage);display:flex;align-items:center;justify-content:center;}
  .brand .name{font-family:var(--serif);font-size:30px;font-weight:500;letter-spacing:-.02em;}
  .tag{font-size:10px;color:var(--sage-deep);background:var(--sage-soft);padding:3px 9px;border-radius:999px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
  h1{font-family:var(--serif);font-weight:400;letter-spacing:-.02em;}
  .lead{color:var(--ink-soft);line-height:1.55;}
  .card{background:var(--bone);border:1px solid var(--line);border-radius:20px;padding:18px;}
  .card+.card{margin-top:10px;}
  .row{display:flex;align-items:center;gap:12px;}
  .grow{flex:1;min-width:0;}
  .muted{color:var(--ink-soft);} .faint{color:var(--ink-faint);} .tiny{font-size:12px;}
  .ellip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  label.fld{display:block;margin-top:14px;}
  label.fld>span{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);display:block;margin-bottom:6px;}
  input,textarea,select{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);background:var(--cream);
    border:1px solid var(--line-mid);border-radius:13px;padding:12px 13px;outline:none;}
  textarea{resize:vertical;min-height:74px;line-height:1.5;}
  input:focus,textarea:focus,select:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft);}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%238B8275' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:36px;}
  .btn{font-family:var(--sans);font-size:15px;font-weight:600;border:none;border-radius:14px;padding:12px 16px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,filter .15s;}
  .btn:active{transform:scale(.98);} .btn[disabled]{opacity:.55;cursor:default;}
  .btn-primary{background:var(--sage);color:var(--bone);} .btn-primary:hover{filter:brightness(1.05);}
  .btn-soft{background:var(--sage-soft);color:var(--sage-deep);}
  .btn-terra{background:var(--terra-soft);color:var(--terra);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line-mid);}
  .btn-block{width:100%;}
  .icon-btn{width:36px;height:36px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .err{background:var(--terra-soft);color:var(--terra);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:500;margin-top:14px;line-height:1.45;}
  .ok{background:var(--sage-soft);color:var(--sage-deep);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:500;margin-top:14px;line-height:1.45;}
  .banner{background:#3a342b;color:#f3ead6;font-size:13px;line-height:1.5;padding:12px 16px;text-align:center;}
  .banner code{background:rgba(255,255,255,.14);padding:1px 6px;border-radius:6px;font-size:12px;}
  /* header */
  header.top{position:sticky;top:0;z-index:20;padding:max(14px,env(safe-area-inset-top)) 18px 12px;
    background:rgba(237,230,214,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:9px;}
  header .name{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-.02em;}
  header .spacer{flex:1;}
  .chip{font-size:12px;font-weight:600;border:1px solid var(--line-mid);background:var(--bone);color:var(--ink-soft);
    border-radius:999px;padding:6px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .av{width:24px;height:24px;border-radius:999px;background:var(--sage);color:var(--bone);font-family:var(--serif);
    font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .av.lg{width:38px;height:38px;font-size:15px;}
  main{flex:1;overflow-y:auto;padding:18px 20px 120px;}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--ink-faint);font-weight:600;}
  h1.title{font-family:var(--serif);font-weight:400;font-size:29px;letter-spacing:-.02em;margin:6px 0 0;line-height:1.05;}
  h1.title b{font-weight:600;}
  .sub{font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin-top:8px;}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--ink-faint);font-weight:600;margin:26px 0 12px;}
  .stat{display:flex;gap:18px;} .stat .n{font-family:var(--serif);font-size:24px;font-weight:600;line-height:1;} .stat .l{font-size:11px;color:var(--ink-soft);margin-top:3px;}
  .fab-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .quick{display:flex;flex-direction:column;align-items:flex-start;gap:8px;background:var(--bone);border:1px solid var(--line);border-radius:18px;padding:14px;cursor:pointer;transition:transform .08s,border-color .15s;}
  .quick:active{transform:scale(.98);} .quick:hover{border-color:var(--line-mid);}
  .quick .ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
  .quick span{font-size:13px;font-weight:600;}
  .chips{display:flex;gap:7px;flex-wrap:wrap;}
  .fchip{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--line-mid);background:var(--bone);color:var(--ink-soft);cursor:pointer;white-space:nowrap;}
  .fchip.on{background:var(--ink);color:var(--bone);border-color:var(--ink);}
  .seg{display:flex;background:var(--cream-deep);border-radius:14px;padding:4px;gap:4px;}
  .seg button{flex:1;border:none;background:transparent;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-soft);padding:9px;border-radius:10px;cursor:pointer;}
  .seg button.on{background:var(--bone);color:var(--ink);box-shadow:0 1px 4px rgba(42,38,32,0.08);}
  .pickrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
  .pick{font-size:13px;font-weight:600;padding:9px 12px;border-radius:12px;border:1px solid var(--line-mid);background:var(--cream);color:var(--ink-soft);cursor:pointer;}
  .pick.on{background:var(--sage);color:var(--bone);border-color:var(--sage);}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:999px;}
  .flagchip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--terra);background:var(--terra-soft);padding:3px 9px;border-radius:999px;}
  .photo{margin-top:9px;border-radius:14px;width:100%;max-height:240px;object-fit:cover;border:1px solid var(--line);display:block;}
  /* timeline */
  .tl-day{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);margin:18px 0 10px;}
  .entry{display:flex;gap:12px;padding-bottom:16px;position:relative;}
  .entry .stem{position:absolute;left:17px;top:36px;bottom:-2px;width:1.5px;background:var(--line);}
  .entry:last-child .stem{display:none;}
  .entry .dot{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;}
  .entry .body{flex:1;min-width:0;padding-top:1px;cursor:pointer;}
  .entry .meta{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-faint);margin-top:6px;}
  .empty{text-align:center;padding:32px 18px;border:1.5px dashed var(--line-mid);border-radius:20px;background:rgba(247,242,231,.5);}
  .empty .ic{width:46px;height:46px;border-radius:14px;background:var(--sage-soft);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
  .empty h3{font-family:var(--serif);font-weight:500;font-size:18px;margin:0 0 6px;}
  .empty p{font-size:13px;color:var(--ink-soft);margin:0 auto 16px;max-width:250px;line-height:1.5;}
  .note{font-size:12px;color:var(--ink-faint);line-height:1.5;background:var(--gold-soft);border-radius:12px;padding:11px 13px;margin-top:14px;display:flex;gap:9px;}
  .note svg{flex-shrink:0;margin-top:1px;color:var(--gold);}
  .divider{height:1px;background:var(--line);margin:22px 0;}
  .spin{width:30px;height:30px;border-radius:999px;border:3px solid var(--line-mid);border-top-color:var(--sage);animation:sp .8s linear infinite;margin:0 auto;}
  @keyframes sp{to{transform:rotate(360deg);}}
  /* attention */
  .att{display:flex;gap:11px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .att:last-child{border-bottom:none;}
  .att .ad{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  /* nav */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:20;max-width:480px;margin:0 auto;
    display:flex;justify-content:space-around;align-items:center;
    padding:8px 8px max(8px,env(safe-area-inset-bottom));
    background:rgba(247,242,231,.93);backdrop-filter:blur(20px);border-top:1px solid var(--line);}
  nav.tabs button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;color:var(--ink-faint);}
  nav.tabs button.on{color:var(--sage-deep);}
  nav.tabs span{font-size:10px;font-weight:600;}
  /* modal */
  .scrim{position:fixed;inset:0;z-index:50;background:rgba(42,38,32,0.42);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .18s;}
  .scrim.show{opacity:1;}
  .sheet{width:100%;max-width:480px;background:var(--bone);border-radius:26px 26px 0 0;max-height:92vh;overflow-y:auto;transform:translateY(18px);transition:transform .22s cubic-bezier(.2,.8,.2,1);padding:8px 20px max(22px,env(safe-area-inset-bottom));}
  .scrim.show .sheet{transform:translateY(0);}
  @media(min-width:520px){ .scrim{align-items:center;} .sheet{border-radius:24px;max-height:88vh;box-shadow:var(--shadow);} }
  .grip{width:38px;height:4px;border-radius:999px;background:var(--line-mid);margin:8px auto 6px;}
  .sheet h2{font-family:var(--serif);font-weight:500;font-size:21px;margin:8px 2px 4px;}
  .sheet .glead{font-size:13px;color:var(--ink-soft);margin:0 2px 8px;line-height:1.5;}
  .togglerow{display:flex;align-items:center;justify-content:space-between;background:var(--cream);border:1px solid var(--line-mid);border-radius:13px;padding:11px 13px;margin-top:14px;}
  .togglerow .lab{font-size:14px;font-weight:600;}
  .switch{width:46px;height:27px;border-radius:999px;background:var(--line-mid);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;}
  .switch.on{background:var(--sage);}
  .switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:999px;background:#fff;transition:left .15s;}
  .switch.on i{left:22px;}
  .sheet-actions{display:flex;gap:10px;margin-top:22px;}
  .photo-add{margin-top:14px;border:1.5px dashed var(--line-mid);border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--ink-soft);font-size:13px;font-weight:600;background:var(--cream);}
  .photo-prev{position:relative;margin-top:14px;}
  .photo-prev img{width:100%;border-radius:14px;max-height:220px;object-fit:cover;display:block;}
  .photo-prev .rm{position:absolute;top:8px;right:8px;background:rgba(42,38,32,0.7);color:#fff;}
  .codebox{font-family:ui-monospace,Menlo,monospace;font-size:22px;font-weight:600;letter-spacing:.2em;color:var(--sage-deep);background:var(--sage-soft);border-radius:12px;padding:14px;text-align:center;}
  /* packet */
  #packetView{display:none;}
  .pk-h{border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:4px;}
  .pk-sec{margin-top:22px;}
  .pk-sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--sage-deep);border-bottom:1px solid var(--line-mid);padding-bottom:6px;margin:0 0 10px;}
  .pk-item{padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.5;}
  .pk-item .d{font-size:12px;color:var(--ink-faint);font-weight:600;}
  @media print{
    body{background:#fff;} body *{visibility:hidden;}
    #packetView,#packetView *{visibility:visible;}
    #packetView{display:block !important;position:absolute;inset:0;padding:24px 30px;background:#fff;}
    .pk-noprint{display:none !important;}
  }
  a.plain{color:var(--sage-deep);text-decoration:none;font-weight:600;}
</style>
</head>

/* ---------- helpers ---------- */
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function initial(n){n=(n||'').trim();return n?n[0].toUpperCase():'?';}
function todayStr(){return new Date().toISOString().slice(0,10);}
function parseD(s){if(!s)return null;const p=(''+s).split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(s){const d=parseD(s);if(!d)return'';return MON[d.getMonth()]+' '+d.getDate();}
function fmtLong(s){const d=parseD(s);if(!d)return'';return DOW[d.getDay()]+', '+MON[d.getMonth()]+' '+d.getDate();}
function fmtTime(t){if(!t)return'';const p=(''+t).split(':');let h=+p[0];const m=p[1];const ap=h>=12?'PM':'AM';h=h%12;if(h===0)h=12;return h+':'+m+' '+ap;}
function ago(iso){const ts=Date.parse(iso);if(isNaN(ts))return'';const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'just now';const m=Math.floor(s/60);if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';const d=Math.floor(h/24);if(d===1)return'yesterday';if(d<7)return d+'d ago';return fmt(new Date(ts).toISOString().slice(0,10));}
function daysUntil(s){const d=parseD(s);if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);}
function ageFrom(dob){const d=parseD(dob);if(!d)return null;const t=new Date();let a=t.getFullYear()-d.getFullYear();const mm=t.getMonth()-d.getMonth();if(mm<0||(mm===0&&t.getDate()<d.getDate()))a--;return a>=0?a:null;}
function oneLine(s){s=(s||'').replace(/\s+/g,' ').trim();return s.length>64?s.slice(0,64)+'\u2026':s;}
function newCode(){let s='';const a='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';for(let i=0;i<6;i++)s+=a[Math.floor(Math.random()*a.length)];return s;}

/* ---------- TODAY ---------- */
function nextAppt(){
  return COL.appts.filter(a=>!a.done&&daysUntil(a.appt_date)!=null&&daysUntil(a.appt_date)>=0)
    .sort((a,b)=>((a.appt_date+(a.appt_time||''))).localeCompare(b.appt_date+(b.appt_time||'')))[0]||null;
}
function attentionItems(){
  const out=[];
  COL.appts.forEach(a=>{const du=daysUntil(a.appt_date);const k=APPT_KINDS[a.kind]||APPT_KINDS.other;if(!a.done&&du!=null&&du<0)out.push({sev:'over',icon:k.i,title:(a.title||k.l),sub:'Overdue \u00b7 '+fmt(a.appt_date),act:'open-appt',id:a.id});});
  COL.appts.forEach(a=>{const du=daysUntil(a.appt_date);const k=APPT_KINDS[a.kind]||APPT_KINDS.other;if(!a.done&&du!=null&&du>=0&&du<=7)out.push({sev:'soon',icon:k.i,title:(a.title||k.l),sub:(du===0?'Today':du===1?'Tomorrow':'In '+du+' days')+(a.appt_time?' \u00b7 '+fmtTime(a.appt_time):''),act:'open-appt',id:a.id});});
  COL.contacts.filter(c=>c.flagged).slice(0,3).forEach(c=>out.push({sev:'flag',icon:'alertT',title:'Flagged: '+(CONTACT_KINDS[c.kind]||'contact'),sub:fmt(c.occurred_on)+(c.with_whom?' \u00b7 '+c.with_whom:''),act:'open-contact',id:c.id}));
  return out.slice(0,6);
}
function weekCounts(){
  const since=Date.now()-7*86400000;
  const m=COL.moments.filter(x=>Date.parse(x.created_at)>=since).length;
  const c=COL.contacts.filter(x=>Date.parse(x.created_at)>=since).length;
  const u=COL.appts.filter(a=>!a.done&&daysUntil(a.appt_date)!=null&&daysUntil(a.appt_date)>=0&&daysUntil(a.appt_date)<=7).length;
  return {m,c,u};
}
function activityFeed(n){
  const out=[];
  COL.moments.forEach(m=>{const t=TYPES[m.type]||TYPES.note;out.push({at:m.created_at,by:m.created_by,icon:t.i,text:t.l+' \u2014 '+oneLine(m.body||m.mood||'')});});
  COL.contacts.forEach(c=>out.push({at:c.created_at,by:c.created_by,icon:'scale',text:(CONTACT_KINDS[c.kind]||'Contact')+(c.with_whom?' with '+c.with_whom:'')+(c.what_happened?' \u2014 '+oneLine(c.what_happened):'')}));
  COL.appts.forEach(a=>{const k=APPT_KINDS[a.kind]||APPT_KINDS.other;out.push({at:a.created_at,by:a.created_by,icon:k.i,text:(a.title||k.l)+' \u00b7 '+fmt(a.appt_date)});});
  COL.docs.forEach(d=>out.push({at:d.created_at,by:d.created_by,icon:'file',text:'Added document \u2014 '+oneLine(d.name)}));
  return out.sort((a,b)=>Date.parse(b.at)-Date.parse(a.at)).slice(0,n);
}

      return '<div class="att" data-action="'+a.act+'" data-id="'+a.id+'"><div class="ad" style="background:'+bg+';color:'+col+'">'+ic(a.icon,17)+'</div>'
      +'<div class="grow"><p style="font-size:14px;font-weight:600">'+esc(a.title)+'</p><p class="tiny faint" style="margin-top:2px">'+esc(a.sub)+'</p></div>'

    h+='</div>';
  }

    +quick('add-moment','book',C.sage,C.sageSoft,'Log a moment')

  else{h+='<div>'+feed.map(f=>{const who=whoName(f.by);return '<div class="row" style="padding:11px 0;border-bottom:1px solid var(--line);align-items:flex-start">'

  return h;

  h+='<div style="margin-top:8px">';let lastDay='';

function openSheet(inner){
  $('modalRoot').innerHTML='<div class="scrim" id="scrim"><div class="sheet"><div class="grip"></div>'+inner+'</div></div>';
  modalOpen=true;
  requestAnimationFrame(()=>{const s=$('scrim');if(s)s.classList.add('show');});

}
function closeSheet(){const s=$('scrim');modalOpen=false;draftPhoto=null;editId=null;if(!s)return;s.classList.remove('show');setTimeout(()=>{$('modalRoot').innerHTML='';},200);}
function val(id){const e=$(id);return e?e.value.trim():'';}
function sw(id){const e=$(id);return e?e.classList.contains('on'):false;}
function actionsRow(saveAct,delAct){return '<div class="sheet-actions">'+(delAct?'<button class="btn btn-ghost" style="color:'+C.terra+';flex:0 0 auto" data-action="'+delAct+'">'+ic('trash',16)+'</button>':'')+'<button class="btn btn-ghost grow" data-action="close">Cancel</button><button class="btn btn-primary grow" data-action="'+saveAct+'">Save</button></div>';}
function picker(name,opts,cur,onchange){return '<input type="hidden" id="'+name+'" value="'+esc(cur||opts[0][0])+'"><div class="pickrow" data-picker="'+name+'"'+(onchange?' data-onchange="'+onchange+'"':'')+'>'+opts.map(o=>'<button type="button" class="pick '+((cur||opts[0][0])===o[0]?'on':'')+'" data-val="'+esc(o[0])+'">'+esc(o[1])+'</button>').join('')+'</div>';}
function bindPickers(){document.querySelectorAll('[data-picker]').forEach(row=>{row.addEventListener('click',e=>{const b=e.target.closest('.pick');if(!b)return;row.querySelectorAll('.pick').forEach(x=>x.classList.remove('on'));b.classList.add('on');$(row.getAttribute('data-picker')).value=b.getAttribute('data-val');const oc=row.getAttribute('data-onchange');if(oc==='moment-type')reflectMomentType(b.getAttribute('data-val'));});});}

}

/* PERSON */
function personModal(p,kind){
  editId=p?p.id:null;const k=p?p.kind:kind;
  const hint=k==='caseteam'?'Caseworker / GAL / CASA / therapist':'Biological mother / father / grandparent';
  let h='<h2>'+(p?'Edit person':'Add person')+'</h2>';
  h+='<label class="fld"><span>Name</span><input type="text" id="p_name" placeholder="Full name" value="'+esc(p?p.name:'')+'"></label>';
  h+='<label class="fld"><span>Role</span><input type="text" id="p_role" placeholder="'+esc(hint)+'" value="'+esc(p?p.role:'')+'"></label>';
  h+='<label class="fld"><span>Organisation</span><input type="text" id="p_org" placeholder="e.g. Lawrence County DCS" value="'+esc(p?p.org:'')+'"></label>';
  h+='<div class="row" style="gap:10px"><label class="fld grow"><span>Phone</span><input type="tel" id="p_phone" value="'+esc(p?p.phone:'')+'"></label><label class="fld grow"><span>Email</span><input type="email" id="p_email" value="'+esc(p?p.email:'')+'"></label></div>';
  h+='<input type="hidden" id="p_kind" value="'+k+'">';
  h+='<div id="pErr"></div>'+actionsRow('save-person',p?'del-person':null);
  openSheet(h);
}
async function savePerson(){
  const name=val('p_name');if(!name){$('pErr').innerHTML='<div class="err">Add a name.</div>';return;}
  const used=COL.people.length;
  const o={name,role:val('p_role'),org:val('p_org'),phone:val('p_phone'),email:val('p_email'),kind:val('p_kind'),color:(editId?undefined:PERSON_COLORS[used%PERSON_COLORS.length])};
  if(editId)delete o.color;
  await saveRow('people',o,loadPeople);
}

/* generic save/delete */
async function saveRow(table,payload,reload){
  try{
    if(editId){const {error}=await sb.from(table).update(payload).eq('id',editId);if(error)throw error;}
    else{payload.household_id=household.id;const {error}=await sb.from(table).insert(payload);if(error)throw error;}
    closeSheet(); await reload(); renderTab();
  }catch(e){ const box=$('mErr')||$('cErr')||$('aErr')||$('dErr')||$('pErr'); if(box)box.innerHTML='<div class="err">'+esc(e.message||'Could not save.')+'</div>'; }
}
async function delRow(table,reload){
  if(!editId)return;if(!confirm('Delete this? This cannot be undone.'))return;
  try{const {error}=await sb.from(table).delete().eq('id',editId);if(error)throw error;closeSheet();await reload();renderTab();}
  catch(e){alert(e.message||'Could not delete.');}
}

/* ---------- COURT PACKET ---------- */
function packetModal(){
  const since=new Date(Date.now()-90*86400000).toISOString().slice(0,10);
  let h='<h2>Build a court packet</h2><p class="glead">Pick the period since your last hearing. We\u2019ll compile your logs into a clean summary you can print or save as PDF.</p>';
  h+='<div class="row" style="gap:10px"><label class="fld grow"><span>From</span><input type="date" id="pk_from" value="'+since+'"></label><label class="fld grow"><span>To</span><input type="date" id="pk_to" value="'+todayStr()+'"></label></div>';
  h+='<div class="note">'+ic('spark',16)+'<div>This compiles what you\u2019ve logged. Claude-drafted narrative and a separate caseworker/GAL version come with the AI features.</div></div>';
  h+='<div class="sheet-actions"><button class="btn btn-ghost grow" data-action="close">Cancel</button><button class="btn btn-primary grow" data-action="gen-packet">Generate</button></div>';
  openSheet(h);
}
function genPacket(){
  const from=val('pk_from'),to=val('pk_to');const inR=d=>d&&d>=from&&d<=to;
  const appts=COL.appts.filter(a=>inR(a.appt_date)).slice().sort((a,b)=>a.appt_date.localeCompare(b.appt_date));
  const contacts=COL.contacts.filter(c=>inR(c.occurred_on)).slice().sort((a,b)=>a.occurred_on.localeCompare(b.occurred_on));
  const moments=COL.moments.filter(m=>inR(m.occurred_on)).slice().sort((a,b)=>a.occurred_on.localeCompare(b.occurred_on));
  const docs=COL.docs.filter(d=>inR(d.doc_date)).slice().sort((a,b)=>(a.doc_date||'').localeCompare(b.doc_date||''));
  const nm=childName();
  let p='<div class="pk-noprint" style="display:flex;gap:10px;justify-content:flex-end;margin-bottom:14px"><button class="btn btn-ghost" data-action="close-packet">Close</button><button class="btn btn-primary" data-action="print-packet">'+ic('file',16)+'Print / Save PDF</button></div>';
  p+='<div class="pk-h"><h1 style="font-family:var(--serif);font-size:24px;font-weight:600;margin:0">Family record \u2014 '+esc(nm)+'</h1><p class="tiny muted" style="margin:6px 0 0">Period: '+esc(fmtLong(from))+' \u2013 '+esc(fmtLong(to))+' \u00b7 Compiled '+esc(fmtLong(todayStr()))+' by '+esc(meName())+'</p></div>';
  p+=pkSec('Hearings & appointments',appts.map(a=>{const k=APPT_KINDS[a.kind]||APPT_KINDS.other;return pkItem(fmt(a.appt_date)+(a.appt_time?' '+fmtTime(a.appt_time):''),(a.title||k.l)+(a.location?' \u00b7 '+esc(a.location):'')+(a.notes?'<br>'+esc(a.notes):''));}));
  p+=pkSec('Visits & biological-family contact',contacts.map(c=>{let b=(CONTACT_KINDS[c.kind]||'Contact')+(c.with_whom?' with '+esc(c.with_whom):'')+(c.supervised?' (supervised)':'');if(c.what_happened)b+='<br>'+esc(c.what_happened);if(c.behavior_before)b+='<br><span class="d">Before:</span> '+esc(c.behavior_before);if(c.behavior_after)b+='<br><span class="d">After:</span> '+esc(c.behavior_after);if(c.flagged)b+='<br><b style="color:'+C.terra+'">\u26a0 Flagged concern</b>';return pkItem(fmt(c.occurred_on)+(c.occurred_time?' '+fmtTime(c.occurred_time):''),b);}));
  p+=pkSec('Daily observations & milestones',moments.map(m=>{const t=TYPES[m.type]||TYPES.note;return pkItem(fmt(m.occurred_on),'<b>'+t.l+(m.mood?' \u00b7 '+esc(m.mood):'')+'</b> '+esc(m.body||''));}));
  if(docs.length)p+=pkSec('Documents added',docs.map(d=>pkItem(d.doc_date?fmt(d.doc_date):'\u2014','<b>'+esc(d.name)+'</b> \u00b7 '+esc(d.category||'')+(d.holder?' \u00b7 held by '+esc(d.holder):''))));
  if(!(appts.length+contacts.length+moments.length))p+='<p class="muted" style="margin-top:22px">No entries logged in this period yet.</p>';
  p+='<p class="tiny faint" style="margin-top:28px;border-top:1px solid var(--line);padding-top:12px">This is a personal record compiled by the family from their own logs. It is intended to support, not replace, official case documentation.</p>';
  closeSheet();
  const pv=$('packetView');
  pv.innerHTML='<div style="max-width:680px;margin:0 auto">'+p+'</div>';
  pv.style.cssText='display:block;position:fixed;inset:0;z-index:60;overflow-y:auto;background:'+C.bone+';padding:max(20px,env(safe-area-inset-top)) 20px 40px;';
  pv.scrollTop=0;
}
function pkSec(t,items){if(!items.length)return'';return '<div class="pk-sec"><h3>'+esc(t)+'</h3>'+items.join('')+'</div>';}
function pkItem(date,body){return '<div class="pk-item"><span class="d">'+esc(date)+'</span><div style="margin-top:2px">'+body+'</div></div>';}

/* ---------- PHOTO ---------- */
function photoSlotHTML(label){
  if(draftPhoto)return '<div class="photo-prev"><img src="'+draftPhoto+'" alt=""><button class="icon-btn rm" data-action="rm-photo">'+ic('x',16)+'</button></div>';
  return '<div class="photo-add" data-action="pick-photo">'+ic('cam',18)+esc(label||'Add a photo')+'<input type="file" id="photoInput" accept="image/*" style="display:none"></div>';
}
function pickPhoto(){const inp=$('photoInput');if(!inp)return;inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;compressImage(f,u=>{draftPhoto=u;const s=$('photoSlot');if(s)s.innerHTML=photoSlotHTML();});};inp.click();}
function compressImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=900;let w=img.width,h=img.height;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);try{cb(cv.toDataURL('image/jpeg',0.62));}catch(e){cb(r.result);}};img.onerror=()=>cb(r.result);img.src=r.result;};r.readAsDataURL(file);}

/* ---------- misc actions ---------- */
function showInviteAlert(){alert('Invite code for this space:\n\n   '+(household.invite_code||'\u2014')+'\n\nHave the other person sign in, choose \u201cJoin with a code,\u201d and enter it.');}
async function copyCode(){const code=household.invite_code||'';try{await navigator.clipboard.writeText(code);alert('Copied: '+code);}catch(e){showInviteAlert();}}
async function regenCode(){if(!confirm('Generate a new invite code? The old one will stop working.'))return;const code=newCode();const {error}=await sb.from('households').update({invite_code:code}).eq('id',household.id);if(error){alert(error.message);return;}household.invite_code=code;renderTab();}
async function signOut(){if(pollTimer)clearInterval(pollTimer);await sb.auth.signOut();household=null;profiles={};COL={moments:[],contacts:[],appts:[],docs:[],people:[],members:[]};session=null;hideNav();renderLogin();}

function renderError(msg){
  root.innerHTML='<div class="center"><div class="card"><h1 style="font-size:20px;margin:0 0 8px">Something went sideways</h1><p class="lead tiny" style="margin:0">'+esc(msg)+'</p><button class="btn btn-soft btn-block" style="margin-top:16px" onclick="location.reload()">Try again</button><button class="btn btn-ghost btn-block" style="margin-top:10px" data-action="signout">Sign out</button></div></div>';
}

/* ---------- event delegation ---------- */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]');if(!t)return;
  const a=t.getAttribute('data-action');const id=t.getAttribute('data-id');
  const find=(arr)=>arr.find(x=>x.id===id);
  switch(a){
    case 'tab':UI.tab=t.getAttribute('data-tab');renderTab();break;
    case 'goto-team':UI.tab='team';renderTab();break;
    case 'refresh':softRefresh();break;
    case 'aria-filter':UI.ariaFilter=t.getAttribute('data-f');renderTab();break;
    case 'case-seg':UI.caseSeg=t.getAttribute('data-s');renderTab();break;
    case 'add-moment':momentModal(null);break;
    case 'open-moment':momentModal(find(COL.moments));break;
    case 'save-moment':saveMoment();break;
    case 'del-moment':delRow('moments',loadMoments);break;
    case 'add-contact':contactModal(null);break;
    case 'open-contact':UI.tab='case';UI.caseSeg='visits';contactModal(find(COL.contacts));break;
    case 'save-contact':saveContact();break;
    case 'del-contact':delRow('contacts',loadContacts);break;
    case 'add-appt':apptModal(null);break;
    case 'open-appt':apptModal(find(COL.appts));break;
    case 'save-appt':saveAppt();break;
    case 'del-appt':delRow('appointments',loadAppts);break;
    case 'add-doc':docModal(null);break;
    case 'open-doc':docModal(find(COL.docs));break;
    case 'save-doc':saveDoc();break;
    case 'del-doc':delRow('documents',loadDocs);break;
    case 'add-person':personModal(null,t.getAttribute('data-kind'));break;
    case 'open-person':personModal(find(COL.people));break;
    case 'save-person':savePerson();break;
    case 'del-person':delRow('people',loadPeople);break;
    case 'open-packet':packetModal();break;
    case 'gen-packet':genPacket();break;
    case 'close-packet':$('packetView').style.display='none';$('packetView').innerHTML='';break;
    case 'print-packet':window.print();break;
    case 'pick-photo':pickPhoto();break;
    case 'rm-photo':draftPhoto=null;{const s=$('photoSlot');if(s)s.innerHTML=photoSlotHTML();}break;
    case 'toggle':t.classList.toggle('on');break;
    case 'copy-code':copyCode();break;
    case 'regen-code':regenCode();break;
    case 'signout':signOut();break;
    case 'close':closeSheet();break;
  }
});

boot();
</script>
