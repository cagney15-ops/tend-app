<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#6B7F5A" />
<title>Tend</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%236B7F5A'/%3E%3Cpath d='M24 38s-12-7.5-15.5-15A7.5 7.5 0 0 1 24 12a7.5 7.5 0 0 1 15.5 11C36 30.5 24 38 24 38Z' fill='%23F7F2E7'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --cream:#EDE6D6; --cream-deep:#E3DAC4; --bone:#F7F2E7;
    --ink:#2A2620; --ink-soft:#5A5247; --ink-faint:#8B8275;
    --sage:#6B7F5A; --sage-deep:#4F6042; --sage-soft:#D4DCC9;
    --terra:#B85C3D; --terra-soft:#F4DCD0; --gold:#C8A055; --gold-soft:rgba(200,160,85,0.18);
    --line:rgba(42,38,32,0.08); --line-mid:rgba(42,38,32,0.14);
    --serif:"Fraunces",Georgia,serif; --sans:"DM Sans",system-ui,-apple-system,sans-serif;
    --shadow:0 18px 50px -22px rgba(42,38,32,0.40);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);color:var(--ink);min-height:100vh;min-height:100dvh;
    background:radial-gradient(at 12% 8%, rgba(212,220,201,.55) 0, transparent 50%),
               radial-gradient(at 88% 92%, rgba(244,220,208,.45) 0, transparent 52%), var(--cream);
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;}
  @media(min-width:520px){ .wrap{box-shadow:var(--shadow);border-left:1px solid var(--line);border-right:1px solid var(--line);} }
  .center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 24px;}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px;}
  .brand .mark{width:34px;height:34px;border-radius:999px;background:var(--sage);display:flex;align-items:center;justify-content:center;}
  .brand .name{font-family:var(--serif);font-size:30px;font-weight:500;letter-spacing:-.02em;}
  .tag{font-size:10px;color:var(--sage-deep);background:var(--sage-soft);padding:3px 9px;border-radius:999px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
  h1{font-family:var(--serif);font-weight:400;letter-spacing:-.02em;}
  .lead{color:var(--ink-soft);line-height:1.55;}
  .card{background:var(--bone);border:1px solid var(--line);border-radius:20px;padding:18px;}
  .card+.card{margin-top:10px;}
  .row{display:flex;align-items:center;gap:12px;}
  .grow{flex:1;min-width:0;}
  .muted{color:var(--ink-soft);} .faint{color:var(--ink-faint);} .tiny{font-size:12px;}
  .ellip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  label.fld{display:block;margin-top:14px;}
  label.fld>span{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);display:block;margin-bottom:6px;}
  input,textarea,select{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);background:var(--cream);
    border:1px solid var(--line-mid);border-radius:13px;padding:12px 13px;outline:none;}
  textarea{resize:vertical;min-height:74px;line-height:1.5;}
  input:focus,textarea:focus,select:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft);}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%238B8275' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:36px;}
  .btn{font-family:var(--sans);font-size:15px;font-weight:600;border:none;border-radius:14px;padding:12px 16px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,filter .15s;}
  .btn:active{transform:scale(.98);} .btn[disabled]{opacity:.55;cursor:default;}
  .btn-primary{background:var(--sage);color:var(--bone);} .btn-primary:hover{filter:brightness(1.05);}
  .btn-soft{background:var(--sage-soft);color:var(--sage-deep);}
  .btn-terra{background:var(--terra-soft);color:var(--terra);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line-mid);}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 13px;font-size:13px;border-radius:11px;}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:16px;}
  .caldow{text-align:center;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--ink-faint);padding:4px 0;}
  .calcell{aspect-ratio:1;border-radius:11px;background:var(--bone);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 0 0;position:relative;cursor:pointer;}
  .calcell:active{transform:scale(.94);}
  .calcell.has{border-color:var(--line-mid);}
  .calcell.today{background:var(--sage-soft);border-color:var(--sage);}
  .calcell .cnum{font-size:12.5px;font-weight:600;color:var(--ink-soft);}
  .calcell.today .cnum{color:var(--sage-deep);font-weight:700;}
  .cdots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;justify-content:center;max-width:80%;}
  .cdot{width:5px;height:5px;border-radius:999px;display:inline-block;}
  .av.sm{width:30px;height:30px;font-size:12px;}
  .attach-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .attach-chip{position:relative;width:74px;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;}
  .attach-chip img,.attach-chip .ak{width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid var(--line-mid);}
  .attach-chip .ak{display:flex;align-items:center;justify-content:center;}
  .ak-pdf{background:var(--terra-soft);color:var(--terra);}
  .ak-video{background:#dfe7f0;color:#41618f;}
  .ak-audio{background:var(--sage-soft);color:var(--sage-deep);}
  .ak-file{background:var(--cream-deep);color:var(--ink-soft);}
  .attach-name{font-size:10px;color:var(--ink-faint);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
  .attach-rm{position:absolute;top:-6px;right:1px;width:20px;height:20px;border-radius:999px;background:var(--ink);color:var(--bone);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .attach-add{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;border:1.5px dashed var(--line-mid);border-radius:13px;padding:12px;cursor:pointer;color:var(--ink-soft);font-size:13.5px;font-weight:600;}
  .attach-add:active{transform:scale(.99);}
  .attach-strip.ro .attach-chip{width:54px;} .attach-strip.ro img,.attach-strip.ro .ak{width:48px;height:48px;border-radius:10px;}
  .attach-strip.ro .attach-name{max-width:52px;}
  .dv-head{display:flex;align-items:center;gap:13px;margin-bottom:14px;}
  .dv-actions{display:flex;gap:8px;margin-bottom:14px;}
  .hub{display:flex;align-items:center;gap:15px;background:var(--bone);border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:6px;cursor:pointer;position:relative;}
  .hub:active{transform:scale(.995);}
  .hub-photo{width:72px;height:72px;border-radius:18px;object-fit:cover;flex-shrink:0;}
  .hub-ph{display:flex;align-items:center;justify-content:center;background:var(--sage-soft);color:var(--sage-deep);}
  .hub-info{flex:1;min-width:0;}
  .hub-stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;}
  .hub-stats div{display:flex;flex-direction:column;}
  .hub-stats b{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--sage-deep);line-height:1.1;}
  .hub-stats span{font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
  .hub-edit{position:absolute;top:14px;right:14px;}
  .icon-btn{width:36px;height:36px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .err{background:var(--terra-soft);color:var(--terra);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:500;margin-top:14px;line-height:1.45;}
  .ok{background:var(--sage-soft);color:var(--sage-deep);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:500;margin-top:14px;line-height:1.45;}
  .banner{background:#3a342b;color:#f3ead6;font-size:13px;line-height:1.5;padding:12px 16px;text-align:center;}
  .banner code{background:rgba(255,255,255,.14);padding:1px 6px;border-radius:6px;font-size:12px;}
  /* header */
  header.top{position:sticky;top:0;z-index:20;padding:max(14px,env(safe-area-inset-top)) 18px 12px;
    background:rgba(237,230,214,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:9px;}
  header .name{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-.02em;}
  header .spacer{flex:1;}
  .chip{font-size:12px;font-weight:600;border:1px solid var(--line-mid);background:var(--bone);color:var(--ink-soft);
    border-radius:999px;padding:6px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .chip-add{background:var(--sage);color:var(--bone);border-color:var(--sage);}
  .chooser{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .choice{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--cream);border:1px solid var(--line-mid);border-radius:16px;padding:13px 15px;cursor:pointer;font-family:var(--sans);transition:transform .07s,border-color .15s,background .15s;}
  .choice:active{transform:scale(.985);} .choice:hover{border-color:var(--sage);background:var(--bone);}
  .choice .ci{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .choice .ct{display:flex;flex-direction:column;gap:2px;}
  .choice .ct b{font-size:15px;font-weight:600;color:var(--ink);}
  .choice .ct small{font-size:12.5px;color:var(--ink-faint);}
  .av{width:24px;height:24px;border-radius:999px;background:var(--sage);color:var(--bone);font-family:var(--serif);
    font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .av.lg{width:38px;height:38px;font-size:15px;}
  main{flex:1;overflow-y:auto;padding:18px 20px 120px;}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--ink-faint);font-weight:600;}
  h1.title{font-family:var(--serif);font-weight:400;font-size:29px;letter-spacing:-.02em;margin:6px 0 0;line-height:1.05;}
  h1.title b{font-weight:600;}
  .sub{font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin-top:8px;}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--ink-faint);font-weight:600;margin:26px 0 12px;}
  .stat{display:flex;gap:18px;} .stat .n{font-family:var(--serif);font-size:24px;font-weight:600;line-height:1;} .stat .l{font-size:11px;color:var(--ink-soft);margin-top:3px;}
  .fab-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .quick{display:flex;flex-direction:column;align-items:flex-start;gap:8px;background:var(--bone);border:1px solid var(--line);border-radius:18px;padding:14px;cursor:pointer;transition:transform .08s,border-color .15s;}
  .quick:active{transform:scale(.98);} .quick:hover{border-color:var(--line-mid);}
  .quick .ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;}
  .quick span{font-size:13px;font-weight:600;}
  .chips{display:flex;gap:7px;flex-wrap:wrap;}
  .fchip{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--line-mid);background:var(--bone);color:var(--ink-soft);cursor:pointer;white-space:nowrap;}
  .fchip.on{background:var(--ink);color:var(--bone);border-color:var(--ink);}
  .seg{display:flex;background:var(--cream-deep);border-radius:14px;padding:4px;gap:4px;}
  .seg button{flex:1;border:none;background:transparent;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-soft);padding:9px;border-radius:10px;cursor:pointer;}
  .seg button.on{background:var(--bone);color:var(--ink);box-shadow:0 1px 4px rgba(42,38,32,0.08);}
  .pickrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
  .pick{font-size:13px;font-weight:600;padding:9px 12px;border-radius:12px;border:1px solid var(--line-mid);background:var(--cream);color:var(--ink-soft);cursor:pointer;}
  .pick.on{background:var(--sage);color:var(--bone);border-color:var(--sage);}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:999px;}
  .flagchip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--terra);background:var(--terra-soft);padding:3px 9px;border-radius:999px;}
  .photo{margin-top:9px;border-radius:14px;width:100%;max-height:240px;object-fit:cover;border:1px solid var(--line);display:block;}
  /* timeline */
  .tl-day{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);margin:18px 0 10px;}
  .entry{display:flex;gap:12px;padding-bottom:16px;position:relative;}
  .entry .stem{position:absolute;left:17px;top:36px;bottom:-2px;width:1.5px;background:var(--line);}
  .entry:last-child .stem{display:none;}
  .entry .dot{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;}
  .entry .body{flex:1;min-width:0;padding-top:1px;cursor:pointer;}
  .entry .meta{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-faint);margin-top:6px;}
  .empty{text-align:center;padding:32px 18px;border:1.5px dashed var(--line-mid);border-radius:20px;background:rgba(247,242,231,.5);}
  .empty .ic{width:46px;height:46px;border-radius:14px;background:var(--sage-soft);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
  .empty h3{font-family:var(--serif);font-weight:500;font-size:18px;margin:0 0 6px;}
  .empty p{font-size:13px;color:var(--ink-soft);margin:0 auto 16px;max-width:250px;line-height:1.5;}
  .note{font-size:12px;color:var(--ink-faint);line-height:1.5;background:var(--gold-soft);border-radius:12px;padding:11px 13px;margin-top:14px;display:flex;gap:9px;}
  .note svg{flex-shrink:0;margin-top:1px;color:var(--gold);}
  .divider{height:1px;background:var(--line);margin:22px 0;}
  .spin{width:30px;height:30px;border-radius:999px;border:3px solid var(--line-mid);border-top-color:var(--sage);animation:sp .8s linear infinite;margin:0 auto;}
  @keyframes sp{to{transform:rotate(360deg);}}
  /* attention */
  .att{display:flex;gap:11px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .att:last-child{border-bottom:none;}
  .att .ad{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  /* nav */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:20;max-width:480px;margin:0 auto;
    display:flex;justify-content:space-around;align-items:center;
    padding:8px 8px max(8px,env(safe-area-inset-bottom));
    background:rgba(247,242,231,.93);backdrop-filter:blur(20px);border-top:1px solid var(--line);}
  nav.tabs button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;color:var(--ink-faint);}
  nav.tabs button.on{color:var(--sage-deep);}
  nav.tabs span{font-size:10px;font-weight:600;}
  /* modal */
  .scrim{position:fixed;inset:0;z-index:50;background:rgba(42,38,32,0.42);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .18s;}
  .scrim.show{opacity:1;}
  .sheet{width:100%;max-width:480px;background:var(--bone);border-radius:26px 26px 0 0;max-height:92vh;overflow-y:auto;transform:translateY(18px);transition:transform .22s cubic-bezier(.2,.8,.2,1);padding:8px 20px max(22px,env(safe-area-inset-bottom));}
  .scrim.show .sheet{transform:translateY(0);}
  @media(min-width:520px){ .scrim{align-items:center;} .sheet{border-radius:24px;max-height:88vh;box-shadow:var(--shadow);} }
  .grip{width:38px;height:4px;border-radius:999px;background:var(--line-mid);margin:8px auto 6px;}
  .sheet h2{font-family:var(--serif);font-weight:500;font-size:21px;margin:8px 2px 4px;}
  .sheet .glead{font-size:13px;color:var(--ink-soft);margin:0 2px 8px;line-height:1.5;}
  .togglerow{display:flex;align-items:center;justify-content:space-between;background:var(--cream);border:1px solid var(--line-mid);border-radius:13px;padding:11px 13px;margin-top:14px;}
  .togglerow .lab{font-size:14px;font-weight:600;}
  .switch{width:46px;height:27px;border-radius:999px;background:var(--line-mid);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;}
  .switch.on{background:var(--sage);}
  .switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:999px;background:#fff;transition:left .15s;}
  .switch.on i{left:22px;}
  .sheet-actions{display:flex;gap:10px;margin-top:22px;}
  .photo-add{margin-top:14px;border:1.5px dashed var(--line-mid);border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--ink-soft);font-size:13px;font-weight:600;background:var(--cream);}
  .photo-prev{position:relative;margin-top:14px;}
  .photo-prev img{width:100%;border-radius:14px;max-height:220px;object-fit:cover;display:block;}
  .photo-prev .rm{position:absolute;top:8px;right:8px;background:rgba(42,38,32,0.7);color:#fff;}
  .codebox{font-family:ui-monospace,Menlo,monospace;font-size:22px;font-weight:600;letter-spacing:.2em;color:var(--sage-deep);background:var(--sage-soft);border-radius:12px;padding:14px;text-align:center;}
  /* packet */
  #packetView{display:none;}
  .pk-lh{display:flex;align-items:center;gap:11px;border-bottom:2px solid var(--sage-deep);padding-bottom:12px;margin-bottom:4px;}
  .pk-lh .pk-mark{width:34px;height:34px;border-radius:999px;background:var(--sage-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .pk-lh .pk-tt{flex:1;min-width:0;}
  .pk-lh .pk-tt h1{font-family:var(--serif);font-size:23px;font-weight:600;margin:0;line-height:1.15;}
  .pk-lh .pk-tt .pk-sub{font-size:12px;color:var(--ink-faint);margin-top:4px;}
  .pk-lh .pk-brand{font-family:var(--serif);font-size:13px;color:var(--sage-deep);font-weight:600;letter-spacing:.02em;text-align:right;}
  .pk-h{border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:4px;}
  .pk-sec{margin-top:22px;}
  .pk-sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--sage-deep);border-bottom:1px solid var(--line-mid);padding-bottom:6px;margin:0 0 10px;}
  .pk-item{padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.5;}
  .pk-item .d{font-size:12px;color:var(--ink-faint);font-weight:600;}
  @media print{
    body{background:#fff;} body *{visibility:hidden;}
    #packetView,#packetView *{visibility:visible;}
    #packetView{display:block !important;position:absolute;inset:0;padding:24px 30px;background:#fff;}
    .pk-noprint{display:none !important;}
  }
  a.plain{color:var(--sage-deep);text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<div id="cfgBanner"></div>
<div class="wrap" id="root"><div class="center"><div class="spin"></div></div></div>
<nav class="tabs" id="navbar" style="display:none"></nav>
<div id="modalRoot"></div>
<div id="packetView"></div>

<script>
"use strict";
const BUILD_STAMP="2026-06 education+ai";

/* ============================================================
   CONFIG  ->  paste your anon key between the quotes below.

function ago(iso){const ts=Date.parse(iso);if(isNaN(ts))return'';const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'just now';const m=Math.floor(s/60);if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';const d=Math.floor(h/24);if(d===1)return'yesterday';if(d<7)return d+'d ago';return fmt(new Date(ts).toISOString().slice(0,10));}

function weekCounts(){
  const since=Date.now()-7*86400000;
  const m=COL.moments.filter(x=>Date.parse(x.created_at)>=since).length;
  const c=COL.contacts.filter(x=>Date.parse(x.created_at)>=since).length;
  const u=COL.appts.filter(a=>!a.done&&daysUntil(a.appt_date)!=null&&daysUntil(a.appt_date)>=0&&daysUntil(a.appt_date)<=7).length;
  return {m,c,u};
}
function activityFeed(n){
  const out=[];

  COL.contacts.forEach(c=>out.push({at:c.created_at,by:c.created_by,icon:'scale',text:(CONTACT_KINDS[c.kind]||'Contact')+(c.with_whom?' with '+c.with_whom:'')+(c.what_happened?' \u2014 '+oneLine(c.what_happened):'')}));
  COL.appts.forEach(a=>{const k=APPT_KINDS[a.kind]||APPT_KINDS.other;out.push({at:a.created_at,by:a.created_by,icon:k.i,text:(a.title||k.l)+' \u00b7 '+fmt(a.appt_date)});});

  return out.sort((a,b)=>Date.parse(b.at)-Date.parse(a.at)).slice(0,n);
}

function pad2(n){return String(n).padStart(2,'0');}
function icsStamp(dateStr,timeStr){
  // floating local time; if no time, all-day
  const p=dateStr.split('-');
  if(timeStr){const t=timeStr.split(':');return {dt:p[0]+pad2(p[1])+pad2(p[2])+'T'+pad2(t[0])+pad2(t[1])+'00',allday:false};}
  return {dt:p[0]+pad2(p[1])+pad2(p[2]),allday:true};
}
function downloadICS(a){
  const k=APPT_KINDS[a.kind]||APPT_KINDS.other;
  const start=icsStamp(a.appt_date,a.appt_time);
  let end='';
  if(!start.allday){const p=a.appt_date.split('-');const t=(a.appt_time||'00:00').split(':');const d=new Date(+p[0],+p[1]-1,+p[2],+t[0],+t[1]);d.setHours(d.getHours()+1);end=d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+'T'+pad2(d.getHours())+pad2(d.getMinutes())+'00';}
  const uidv=(a.id||uid())+'@tend';
  const esc2=s=>(s||'').replace(/([,;\\])/g,'\\$1').replace(/\n/g,'\\n');
  let body='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Tend//Kinship//EN\r\nBEGIN:VEVENT\r\nUID:'+uidv+'\r\nDTSTAMP:'+icsStamp(ymdLocal(new Date()),pad2(new Date().getHours())+':'+pad2(new Date().getMinutes())).dt+'\r\n';
  if(start.allday){body+='DTSTART;VALUE=DATE:'+start.dt+'\r\n';}
  else{body+='DTSTART:'+start.dt+'\r\nDTEND:'+end+'\r\n';}
  body+='SUMMARY:'+esc2(a.title||k.l)+'\r\n';
  if(a.location)body+='LOCATION:'+esc2(a.location)+'\r\n';
  if(a.notes)body+='DESCRIPTION:'+esc2(a.notes)+'\r\n';
  body+='END:VEVENT\r\nEND:VCALENDAR\r\n';
  const blob=new Blob([body],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;link.download=(a.title||k.l).replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.ics';
  document.body.appendChild(link);link.click();
  setTimeout(()=>{document.body.removeChild(link);URL.revokeObjectURL(url);},500);
}

  let all=GLOSSARY.map(g=>Object.assign({},g,{own:false})).concat(custom);

  // group by category
  const cats=['role','legal','document','process','other'];
  const byCat={};all.forEach(g=>{(byCat[g.c]=byCat[g.c]||[]).push(g);});
  cats.forEach(c=>{if(!byCat[c])return;
    h+='<p class="section-label">'+glossaryCategory(c)+'</p>';

        +'<p class="tiny" style="margin-top:6px;line-height:1.55;color:'+C.inkSoft+'">'+esc(g.d)+'</p></div>';
    });
  });
  h+='<p class="tiny faint" style="margin-top:18px;line-height:1.5">These definitions are general explanations, not legal advice. Your state or county may use a term differently \u2014 check with your caseworker or attorney.</p>';
  return h;
}

  modalOpen=true;

}
function closeSheet(){const s=$('scrim');modalOpen=false;draftPhotoPreview=null;draftPhotoBlob=null;draftPhotoKept=null;draftAttach=[];editId=null;if(!s)return;s.classList.remove('show');setTimeout(()=>{$('modalRoot').innerHTML='';},200);}
function val(id){const e=$(id);return e?e.value.trim():'';}
function sw(id){const e=$(id);return e?e.classList.contains('on'):false;}
function shareToggle(id,on){
  return '<div class="togglerow" style="background:'+C.sageSoft+';border-color:transparent">'
    +'<div style="flex:1;padding-right:12px"><span class="lab" style="display:block">Share with family</span>'

function picker(name,opts,cur,onchange){return '<input type="hidden" id="'+name+'" value="'+esc(cur||opts[0][0])+'"><div class="pickrow" data-picker="'+name+'"'+(onchange?' data-onchange="'+onchange+'"':'')+'>'+opts.map(o=>'<button type="button" class="pick '+((cur||opts[0][0])===o[0]?'on':'')+'" data-val="'+esc(o[0])+'">'+esc(o[1])+'</button>').join('')+'</div>';}

// Assemble the period's records into plain text for the AI (same content the packet shows).
function packetRecordsText(from,to){
  const inR=d=>d&&d>=from&&d<=to;
  const appts=COL.appts.filter(a=>inR(a.appt_date)).slice().sort((a,b)=>a.appt_date.localeCompare(b.appt_date));
  const contacts=COL.contacts.filter(c=>inR(c.occurred_on)).slice().sort((a,b)=>a.occurred_on.localeCompare(b.occurred_on));
  const moments=COL.moments.filter(m=>inR(m.occurred_on)).slice().sort((a,b)=>a.occurred_on.localeCompare(b.occurred_on));
  const docs=COL.docs.filter(d=>inR(d.doc_date)).slice().sort((a,b)=>(a.doc_date||'').localeCompare(b.doc_date||''));
  let t='';
  if(appts.length){t+='APPOINTMENTS & HEARINGS:\n';appts.forEach(a=>{const k=APPT_KINDS[a.kind]||APPT_KINDS.other;t+='- '+fmt(a.appt_date)+(a.appt_time?' '+fmtTime(a.appt_time):'')+': '+(a.title||k.l)+(a.location?' at '+a.location:'')+(a.notes?'. Notes: '+a.notes:'')+'\n';});t+='\n';}
  if(contacts.length){t+='VISITS & FAMILY CONTACT:\n';contacts.forEach(c=>{t+='- '+fmt(c.occurred_on)+(c.occurred_time?' '+fmtTime(c.occurred_time):'')+': '+(CONTACT_KINDS[c.kind]||'Contact')+(c.with_whom?' with '+c.with_whom:'')+(c.supervised?' (supervised)':'')+'.';if(c.what_happened)t+=' What happened: '+c.what_happened+'.';if(c.behavior_before)t+=' Behaviour before: '+c.behavior_before+'.';if(c.behavior_after)t+=' Behaviour after: '+c.behavior_after+'.';if(c.flagged)t+=' CAREGIVER FLAGGED A CONCERN'+(c.concern_note?': '+c.concern_note:'')+'.';t+='\n';});t+='\n';}
  if(moments.length){t+='OBSERVATIONS & MILESTONES:\n';moments.forEach(m=>{const ty=TYPES[m.type]||TYPES.note;t+='- '+fmt(m.occurred_on)+': ['+ty.l+(m.mood?' / '+m.mood:'')+'] '+(m.body||'')+'\n';});t+='\n';}
  if(docs.length){t+='DOCUMENTS ADDED:\n';docs.forEach(d=>{t+='- '+(d.doc_date?fmt(d.doc_date):'(no date)')+': '+d.name+(d.category?' ('+d.category+')':'')+(d.holder?', held by '+d.holder:'')+'\n';});t+='\n';}
  return {text:t,count:appts.length+contacts.length+moments.length+docs.length};
}
async function aiDraftPacket(){
  const from=val('pk_from'),to=val('pk_to');
  const wrap=$('pkDraftWrap');if(!wrap)return;
  const {text,count}=packetRecordsText(from,to);
  if(!count){wrap.innerHTML='<div class="err" style="margin-top:10px">Nothing is logged in this period yet, so there\u2019s nothing to draft.</div>';return;}
  wrap.innerHTML='<div class="note" style="margin-top:12px">'+ic('spark',16)+'<div>Drafting a factual summary from '+count+' logged item'+(count===1?'':'s')+'\u2026 this can take a few seconds.</div></div>';
  try{
    const {data,error}=await sb.functions.invoke('draft-packet',{body:{childName:childName(),period:fmtLong(from)+' \u2013 '+fmtLong(to),records:text}});
    if(error)throw error;
    if(data&&data.error)throw new Error(data.error);
    const draft=(data&&data.draft)||'';
    aiDraftText=draft;

/* ---------- ATTACHMENTS ENGINE (reusable across records) ---------- */
const KIND_ICON={image:'cam',video:'play',audio:'mic',pdf:'file',file:'file'};
// Field shown inside a modal. Existing attachments (edit mode) + draft (new uploads) + add control.
function attachField(recordType,recordId){
  const cfg=planCfg();
  const accept=cfg.kinds.map(k=>k==='image'?'image/*':k==='video'?'video/*':k==='audio'?'audio/*':k==='pdf'?'application/pdf':'').filter(Boolean).join(',');
  const existing=recordId?attachmentsFor(recordType,recordId):[];
  let h='<label class="fld"><span>Attachments <span class="faint" style="text-transform:none;letter-spacing:0">(optional)</span></span></label>';
  h+='<div id="attachStrip" class="attach-strip">';
  existing.forEach(a=>{h+=attachChip(a,false);});
  draftAttach.forEach(d=>{h+=attachChip(d,true);});
  h+='</div>';
  h+='<div class="attach-add" data-action="pick-attach"><span>'+ic('paperclip',16)+'Add photo, PDF'+(cfg.kinds.indexOf('video')>=0?', video, audio':'')+'</span>'
    +'<input type="file" id="attachInput" accept="'+accept+'" multiple style="display:none"></div>';
  h+='<p class="tiny faint" style="margin-top:7px;line-height:1.45">'+cfg.label+' plan \u00b7 up to '+cfg.maxMB+'MB each.'
    +(cfg.kinds.indexOf('video')<0?' Video &amp; audio are available on the premium plan.':'')
    +(cfg.kinds.indexOf('audio')>=0?'<br>Only attach recordings you\u2019re lawfully allowed to keep \u2014 consent laws vary by state.':'')+'</p>';
  return h;
}
function attachChip(a,isDraft){
  const kind=a.file_kind||'file';
  const ic2=KIND_ICON[kind]||'file';
  const id=isDraft?a.tmpId:a.id;
  let thumb;
  if(kind==='image'){ const src=isDraft?a.previewUrl:photoSrc(a.storage_path); thumb='<img src="'+src+'" alt="">'; }
  else thumb='<div class="ak ak-'+kind+'">'+ic(ic2,18)+'</div>';
  return '<div class="attach-chip">'+thumb
    +'<button class="attach-rm" data-action="'+(isDraft?'rm-draft-attach':'rm-attach')+'" data-id="'+id+'">'+ic('x',13)+'</button>'
    +'<span class="attach-name">'+esc((isDraft?a.file_name:a.file_name)||kind)+'</span></div>';
}
function pickAttach(){
  const inp=$('attachInput'); if(!inp)return;
  inp.onchange=()=>{
    const files=Array.from(inp.files||[]); const cfg=planCfg();
    files.forEach(f=>{
      const kind=kindFromMime(f.type);
      if(cfg.kinds.indexOf(kind)<0){ alert((kind==='video'||kind==='audio')?'Video and audio uploads are part of the premium plan. Photos and PDFs are included on your current plan.':'That file type isn\u2019t supported.'); return; }
      if(f.size>cfg.maxMB*1024*1024){ alert('"'+f.name+'" is larger than the '+cfg.maxMB+'MB limit on the '+cfg.label+' plan.'); return; }
      if(kind==='image'){ compressImage(f,(dataUrl,blob)=>{ draftAttach.push({tmpId:uid(),file_kind:'image',file_name:f.name,mime:'image/jpeg',size_bytes:(blob&&blob.size)||f.size,blob:blob||f,previewUrl:dataUrl}); redrawAttachStrip(); }); }
      else { draftAttach.push({tmpId:uid(),file_kind:kind,file_name:f.name,mime:f.type,size_bytes:f.size,blob:f,previewUrl:null}); redrawAttachStrip(); }
    });
    inp.value='';
  };
  inp.click();
}
function redrawAttachStrip(){
  const strip=$('attachStrip'); if(!strip)return;
  // re-render: keep existing (data-existing) by leaving them; simplest is full re-render from current modal context is hard,
  // so we just append draft chips not yet shown.
  const shown=new Set(Array.from(strip.querySelectorAll('[data-id]')).map(b=>b.getAttribute('data-id')));
  draftAttach.forEach(d=>{ if(!shown.has(d.tmpId)){ const tmp=document.createElement('div'); tmp.innerHTML=attachChip(d,true); strip.appendChild(tmp.firstChild); } });
}
function removeDraftAttach(tmpId){ draftAttach=draftAttach.filter(d=>d.tmpId!==tmpId); const strip=$('attachStrip'); if(strip){ const btn=strip.querySelector('[data-id="'+tmpId+'"]'); if(btn&&btn.parentNode)btn.parentNode.remove(); } }
async function removeAttach(id){
  if(!confirm('Remove this attachment?'))return;
  const a=COL.attachments.find(x=>x.id===id); if(!a)return;
  try{ await sb.from('attachments').delete().eq('id',id); try{await sb.storage.from('attachments').remove([a.storage_path]);}catch(e){} await loadAttachments(); const strip=$('attachStrip'); if(strip){const btn=strip.querySelector('[data-id="'+id+'"]'); if(btn&&btn.parentNode)btn.parentNode.remove();} }
  catch(e){ alert('Could not remove: '+(e.message||e)); }
}
// Called by save functions: upload all draft files and insert attachment rows for the saved record.
async function commitAttachments(recordType,recordId){
  if(!draftAttach.length)return;
  for(const d of draftAttach){
    try{
      const ext=d.file_kind==='image'?'jpg':(d.file_name&&d.file_name.indexOf('.')>=0?d.file_name.split('.').pop().slice(0,5):d.file_kind);
      const path=household.id+'/'+recordType+'/'+uid()+'.'+ext;
      const {error}=await sb.storage.from('attachments').upload(path,d.blob,{contentType:d.mime||'application/octet-stream',upsert:false});
      if(error)throw error;
      await sb.from('attachments').insert({household_id:household.id,record_type:recordType,record_id:recordId,storage_path:path,file_kind:d.file_kind,file_name:d.file_name,mime:d.mime,size_bytes:d.size_bytes});
    }catch(e){ /* skip a failed file but keep going */ }
  }
  draftAttach=[];
  await loadAttachments();
}

function attachThumbs(recordType,recordId){

    return '<a class="attach-chip ro" href="'+photoSrc(a.storage_path)+'" target="_blank" rel="noopener"><div class="ak ak-'+kind+'">'+ic(KIND_ICON[kind]||'file',16)+'</div><span class="attach-name">'+esc(a.file_name||kind)+'</span></a>';

function setDraftFromExisting(v){draftPhotoKept=v||null;draftPhotoBlob=null;draftPhotoPreview=v?photoSrc(v):null;}
function pickPhoto(){const inp=$('photoInput');if(!inp)return;inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;compressImage(f,(dataUrl,blob)=>{draftPhotoPreview=dataUrl;draftPhotoBlob=blob;draftPhotoKept=null;const s=$('photoSlot');if(s)s.innerHTML=photoSlotHTML();});};inp.click();}
function compressImage(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const max=1200;let w=img.width,h=img.height;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}const cv=document.createElement('canvas');cv.width=Math.round(w);cv.height=Math.round(h);cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);const dataUrl=(function(){try{return cv.toDataURL('image/jpeg',0.72);}catch(e){return r.result;}})();if(cv.toBlob){cv.toBlob(b=>cb(dataUrl,b),'image/jpeg',0.72);}else{cb(dataUrl,null);}};img.onerror=()=>cb(r.result,null);img.src=r.result;};r.readAsDataURL(file);}

async function refreshRemindCard(){
  const sub=$('remindSub'),ctl=$('remindCtl'); if(!sub||!ctl)return;
  const st=await pushStatus();
  if(st==='unavailable'){
    sub.textContent='Add Tend to your Home Screen to enable reminders (Share \u2192 Add to Home Screen on iPhone).';
    ctl.innerHTML='';
  } else if(st==='denied'){
    sub.textContent='Notifications are blocked in your device settings. Re-enable them for Tend, then come back.';
    ctl.innerHTML='';
  } else if(st==='on'){
    sub.textContent='On \u2014 you\u2019ll get a heads-up before hearings and appointments.';
    ctl.innerHTML='<button class="btn btn-ghost btn-sm" data-action="push-off">Turn off</button>';
  } else {
    sub.textContent='Get a notification the day before a hearing or appointment.';
    ctl.innerHTML='<button class="btn btn-soft btn-sm" data-action="push-on">Turn on</button>';
  }
}
function pushConfigured(){ return VAPID_PUBLIC && VAPID_PUBLIC!=='PASTE_YOUR_VAPID_PUBLIC_KEY_HERE'; }
function pushSupported(){ return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window; }
function urlB64ToUint8(base64){
  const pad='='.repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
  return arr;
}
async function pushStatus(){
  if(!pushSupported()||!pushConfigured())return 'unavailable';
  if(Notification.permission==='denied')return 'denied';
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    return sub?'on':'off';
  }catch(e){ return 'off'; }
}
async function enablePush(){
  if(!pushSupported()){alert('This device or browser doesn\u2019t support reminders. On iPhone, add Tend to your Home Screen first (Share \u2192 Add to Home Screen), then try again.');return;}
  if(!pushConfigured()){alert('Reminders aren\u2019t set up on this copy of Tend yet.');return;}
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){renderTab();return;}
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){ sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)}); }
    const j=sub.toJSON();
    await sb.from('push_subscriptions').upsert({
      household_id:household.id, user_id:session.user.id,
      endpoint:sub.endpoint, p256dh:j.keys.p256dh, auth:j.keys.auth
    },{onConflict:'endpoint'});
    renderTab();
  }catch(e){ alert('Could not turn on reminders: '+(e.message||e)); }
}
async function disablePush(){
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){ await sb.from('push_subscriptions').delete().eq('endpoint',sub.endpoint); await sub.unsubscribe(); }
    renderTab();
  }catch(e){ alert('Could not turn off reminders: '+(e.message||e)); }
}

function taskModal(t){
  editId=t?t.id:null;
  const memOpts=[['','Anyone']].concat(COL.members.map(mb=>[mb.user_id,whoName(mb.user_id).split(' ')[0]+(mb.user_id===session.user.id?' (you)':'')]));
  let h='<h2>'+(t?'Edit task':'Add a task')+'</h2><p class="glead">A follow-up or to-do. Assign it to someone in the space, or leave it for anyone.</p>';
  h+='<label class="fld"><span>Task</span><input type="text" id="t_title" placeholder="e.g. Send school the placement order" value="'+esc(t?t.title:'')+'"></label>';
  h+='<label class="fld"><span>Assign to</span></label>'+picker('t_assigned',memOpts,t&&t.assigned_to?t.assigned_to:'');
  h+='<label class="fld"><span>Due date <span class="faint" style="text-transform:none;letter-spacing:0">(optional)</span></span><input type="date" id="t_due" value="'+(t?t.due_date||'':'')+'"></label>';
  h+='<label class="fld"><span>Notes</span><textarea id="t_notes" placeholder="Any detail\u2026">'+esc(t?t.notes:'')+'</textarea></label>';
  if(t)h+='<div class="togglerow"><span class="lab">Done</span><div class="switch '+(t.done?'on':'')+'" data-action="toggle" id="t_done"><i></i></div></div>';
  h+='<div id="tErr"></div>'+actionsRow('save-task',t?'del-task':null);
  openSheet(h);bindPickers();
}
async function saveTask(){
  const title=val('t_title');if(!title){$('tErr').innerHTML='<div class="err">Add a few words for the task.</div>';return;}
  const wasDone=editId?((COL.tasks.find(x=>x.id===editId)||{}).done):false;
  const done=editId?sw('t_done'):false;
  const o={title,assigned_to:val('t_assigned')||null,due_date:val('t_due')||null,notes:val('t_notes'),done,done_at:(done&&!wasDone)?new Date().toISOString():(done?undefined:null)};
  await saveRow('tasks',o,loadTasks);
}
async function toggleTaskDone(id){
  const t=COL.tasks.find(x=>x.id===id);if(!t)return;
  try{await sb.from('tasks').update({done:!t.done,done_at:!t.done?new Date().toISOString():null}).eq('id',id);await loadTasks();renderTab();}catch(e){alert(e.message||'Could not update.');}
}

async function signOut(){if(pollTimer)clearInterval(pollTimer);await sb.auth.signOut();household=null;profiles={};COL={moments:[],contacts:[],appts:[],docs:[],people:[],members:[]};session=null;hideNav();renderLogin();}

function renderError(msg){
  root.innerHTML='<div class="center"><div class="card"><h1 style="font-size:20px;margin:0 0 8px">Something went sideways</h1><p class="lead tiny" style="margin:0">'+esc(msg)+'</p><button class="btn btn-soft btn-block" style="margin-top:16px" onclick="location.reload()">Try again</button><button class="btn btn-ghost btn-block" style="margin-top:10px" data-action="signout">Sign out</button></div></div>';
}

/* ---------- event delegation ---------- */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]');if(!t)return;
  const a=t.getAttribute('data-action');const id=t.getAttribute('data-id');
  const find=(arr)=>arr.find(x=>x.id===id);
  switch(a){
    case 'tab':UI.tab=t.getAttribute('data-tab');closeSheet();if(isFamily())renderFamilyTab();else renderTab();break;
    case 'fam-signout':signOut();break;
    case 'goto-team':UI.tab='team';renderTab();break;
    case 'refresh':softRefresh();break;
    case 'open-add':addChooser();break;
    case 'aria-filter':UI.ariaFilter=t.getAttribute('data-f');renderTab();break;
    case 'case-seg':UI.caseSeg=t.getAttribute('data-s');renderTab();break;
    case 'health-seg':UI.healthSeg=t.getAttribute('data-s');renderTab();break;
    case 'cal-prev':{const [y,m]=UI.calMonth.split('-').map(Number);const d=new Date(y,m-2,1);UI.calMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');renderTab();break;}
    case 'cal-next':{const [y,m]=UI.calMonth.split('-').map(Number);const d=new Date(y,m,1);UI.calMonth=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');renderTab();break;}
    case 'cal-day':{const ds=t.getAttribute('data-d');if(apptsOn(ds).length)calDayModal(ds);else apptModal(null,ds);break;}
    case 'ics-appt':{const a=COL.appts.find(x=>x.id===id);if(a)downloadICS(a);break;}
    case 'add-moment':momentModal(null);break;
    case 'open-moment':momentModal(find(COL.moments));break;
    case 'save-moment':saveMoment();break;
    case 'del-moment':delRow('moments',loadMoments);break;
    case 'add-contact':contactModal(null);break;
    case 'open-contact':UI.tab='case';UI.caseSeg='visits';contactModal(find(COL.contacts));break;
    case 'save-contact':saveContact();break;
    case 'del-contact':delRow('contacts',loadContacts);break;
    case 'add-appt':apptModal(null);break;
    case 'add-appt-on':apptModal(null,t.getAttribute('data-d'));break;
    case 'open-appt':apptModal(find(COL.appts));break;
    case 'save-appt':saveAppt();break;
    case 'del-appt':delRow('appointments',loadAppts);break;
    case 'add-doc':docModal(null);break;
    case 'open-doc':docModal(find(COL.docs));break;
    case 'save-doc':saveDoc();break;
    case 'del-doc':delRow('documents',loadDocs);break;
    case 'add-person':personModal(null,t.getAttribute('data-kind')||'caseteam');break;
    case 'open-person':personDetail(find(COL.people));break;
    case 'edit-person':personModal(COL.people.find(x=>x.id===id));break;
    case 'save-person':savePerson();break;
    case 'del-person':delRow('people',loadPeople);break;
    case 'add-provider':providerModal(null);break;
    case 'open-provider':providerDetail(find(COL.providers));break;
    case 'edit-provider':providerModal(COL.providers.find(x=>x.id===id));break;
    case 'save-provider':saveProvider();break;
    case 'del-provider':delRow('providers',loadProviders);break;
    case 'add-med':medModal(null);break;
    case 'open-med':medModal(find(COL.medications));break;
    case 'save-med':saveMed();break;
    case 'del-med':delRow('medications',loadMeds);break;
    case 'add-expense':expenseModal(null);break;
    case 'open-expense':expenseModal(find(COL.expenses));break;
    case 'save-expense':saveExpense();break;
    case 'del-expense':delRow('expenses',loadExpenses);break;
    case 'expense-report':expenseReport();break;
    case 'add-task':taskModal(null);break;
    case 'open-task':taskModal(find(COL.tasks));break;
    case 'save-task':saveTask();break;
    case 'del-task':delRow('tasks',loadTasks);break;
    case 'toggle-task':toggleTaskDone(id);break;
    case 'edit-child':editChildModal();break;
    case 'save-child':saveChild();break;
    case 'edit-education':educationModal();break;
    case 'save-education':saveEducation();break;
    case 'add-term':termModal(null);break;
    case 'open-term':termModal(find(COL.glossary));break;
    case 'save-term':saveTerm();break;
    case 'del-term':delRow('glossary_terms',loadGlossary);break;
    case 'open-packet':packetModal();break;
    case 'gen-packet':genPacket();break;
    case 'close-packet':$('packetView').style.display='none';$('packetView').innerHTML='';break;
    case 'print-packet':window.print();break;
    case 'pick-photo':pickPhoto();break;
    case 'rm-photo':draftPhotoPreview=null;draftPhotoBlob=null;draftPhotoKept=null;{const s=$('photoSlot');if(s)s.innerHTML=photoSlotHTML();}break;
    case 'toggle':t.classList.toggle('on');if(t.id==='pk_ai'){if(t.classList.contains('on'))aiDraftPacket();else{aiDraftText='';const w=$('pkDraftWrap');if(w)w.innerHTML='';}}break;
    case 'pick-attach':pickAttach();break;
    case 'rm-draft-attach':removeDraftAttach(id);break;
    case 'rm-attach':removeAttach(id);break;
    case 'toggle-concern':{t.classList.toggle('on');const w=$('concernWrap');if(w)w.style.display=t.classList.contains('on')?'block':'none';break;}
    case 'copy-code':copyCode();break;
    case 'regen-code':regenCode();break;
    case 'manage-member':manageMemberModal(id);break;
    case 'save-member-role':saveMemberRole();break;
    case 'remove-member':removeMember();break;
    case 'leave-space':leaveSpace();break;
    case 'push-on':enablePush();break;
    case 'push-off':disablePush();break;
    case 'signout':signOut();break;
    case 'close':closeSheet();break;
  }
});

document.addEventListener('change',e=>{
  const el=e.target;
  if(el&&el.id==='c_person'){
    const p=COL.people.find(x=>x.id===el.value);
    const w=$('c_with');
    if(p&&w&&!w.value.trim()) w.value=p.name;
  }
  if(el&&el.id==='a_provider'&&el.value==='__add'){ apptAddProvider(); }
  if(el&&el.id==='a_caseperson'&&el.value==='__add'){ apptAddCasePerson(); }
});
document.addEventListener('input',e=>{
  const el=e.target;
  if(el&&el.id==='glossSearch'){ UI.glossQuery=el.value; const m=$('main'); if(m){const sc=m.scrollTop; m.innerHTML=screenGlossary(); const inp=$('glossSearch'); if(inp){inp.focus(); try{inp.setSelectionRange(el.value.length,el.value.length);}catch(_){}} m.scrollTop=sc;} }
});

boot();
</script>
