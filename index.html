<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#6B7F5A" />
<title>Tend</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%236B7F5A'/%3E%3Cpath d='M24 38s-12-7.5-15.5-15A7.5 7.5 0 0 1 24 12a7.5 7.5 0 0 1 15.5 11C36 30.5 24 38 24 38Z' fill='%23F7F2E7'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --cream:#EDE6D6; --cream-deep:#E3DAC4; --bone:#F7F2E7;
    --ink:#2A2620; --ink-soft:#5A5247; --ink-faint:#8B8275;
    --sage:#6B7F5A; --sage-deep:#4F6042; --sage-soft:#D4DCC9;
    --terra:#B85C3D; --terra-soft:#F4DCD0; --gold:#C8A055;
    --line:rgba(42,38,32,0.08); --line-mid:rgba(42,38,32,0.14);
    --serif:"Fraunces",Georgia,serif; --sans:"DM Sans",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);color:var(--ink);min-height:100vh;min-height:100dvh;
    background:radial-gradient(at 12% 8%, rgba(212,220,201,.55) 0, transparent 50%),
               radial-gradient(at 88% 92%, rgba(244,220,208,.45) 0, transparent 52%), var(--cream);
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 24px;}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px;}
  .brand .mark{width:34px;height:34px;border-radius:999px;background:var(--sage);display:flex;align-items:center;justify-content:center;}
  .brand .name{font-family:var(--serif);font-size:30px;font-weight:500;letter-spacing:-.02em;}
  .tag{font-size:10px;color:var(--sage-deep);background:var(--sage-soft);padding:3px 9px;border-radius:999px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
  h1{font-family:var(--serif);font-weight:400;letter-spacing:-.02em;}
  .lead{color:var(--ink-soft);line-height:1.55;}
  .card{background:var(--bone);border:1px solid var(--line);border-radius:22px;padding:22px;}
  label.fld{display:block;margin-top:16px;}
  label.fld>span{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);display:block;margin-bottom:6px;}
  input,textarea,select{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);background:var(--cream);
    border:1px solid var(--line-mid);border-radius:13px;padding:13px;outline:none;}
  textarea{resize:vertical;min-height:74px;line-height:1.5;}
  input:focus,textarea:focus,select:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft);}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%238B8275' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:36px;}
  .btn{font-family:var(--sans);font-size:15px;font-weight:600;border:none;border-radius:14px;padding:13px 17px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,filter .15s;}
  .btn:active{transform:scale(.98);} .btn[disabled]{opacity:.55;cursor:default;}
  .btn-primary{background:var(--sage);color:var(--bone);} .btn-primary:hover{filter:brightness(1.05);}
  .btn-soft{background:var(--sage-soft);color:var(--sage-deep);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line-mid);}
  .btn-block{width:100%;}
  .muted{color:var(--ink-soft);} .faint{color:var(--ink-faint);} .tiny{font-size:12px;}
  .err{background:var(--terra-soft);color:var(--terra);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:500;margin-top:14px;line-height:1.45;}
  .ok{background:var(--sage-soft);color:var(--sage-deep);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:500;margin-top:14px;line-height:1.45;}
  .banner{background:#3a342b;color:#f3ead6;font-size:13px;line-height:1.5;padding:12px 16px;text-align:center;}
  .banner code{background:rgba(255,255,255,.14);padding:1px 6px;border-radius:6px;font-size:12px;}
  /* app */
  header.top{position:sticky;top:0;z-index:20;padding:max(14px,env(safe-area-inset-top)) 20px 12px;
    background:rgba(237,230,214,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;}
  header .name{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-.02em;}
  header .spacer{flex:1;}
  .chip{font-size:12px;font-weight:600;border:1px solid var(--line-mid);background:var(--bone);color:var(--ink-soft);
    border-radius:999px;padding:6px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .av{width:24px;height:24px;border-radius:999px;background:var(--sage);color:var(--bone);font-family:var(--serif);
    font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;}
  main{flex:1;overflow-y:auto;padding:18px 20px 40px;}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--ink-faint);font-weight:600;}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--ink-faint);font-weight:600;margin:24px 0 12px;}
  .pickrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
  .pick{font-size:13px;font-weight:600;padding:9px 12px;border-radius:12px;border:1px solid var(--line-mid);background:var(--cream);color:var(--ink-soft);cursor:pointer;}
  .pick.on{background:var(--sage);color:var(--bone);border-color:var(--sage);}
  .moment{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);}
  .moment .dot{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--sage-soft);color:var(--sage-deep);}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:999px;background:var(--sage-soft);color:var(--sage-deep);}
  .empty{text-align:center;padding:34px 18px;border:1.5px dashed var(--line-mid);border-radius:20px;background:rgba(247,242,231,.5);}
  .spin{width:30px;height:30px;border-radius:999px;border:3px solid var(--line-mid);border-top-color:var(--sage);animation:sp 0.8s linear infinite;margin:0 auto;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .codebox{font-family:ui-monospace,Menlo,monospace;font-size:20px;font-weight:600;letter-spacing:.18em;color:var(--sage-deep);
    background:var(--sage-soft);border-radius:12px;padding:13px;text-align:center;}
</style>
</head>
<body>
<div id="cfgBanner"></div>
<div class="wrap" id="root">
  <div class="center"><div class="spin"></div></div>
</div>

<script>
"use strict";

/* ============================================================
   CONFIG  ->  paste your two values from Supabase here.
   Supabase dashboard -> Project Settings -> API
   ============================================================ */
// ====>  PASTE YOUR ANON KEY ON THE LINE BELOW (between the quotes).  <====
// Your Project URL is already filled in for you.
const SUPABASE_URL  = "https://mkwthdcpafpmxwpdgbov.supabase.co";
const SUPABASE_ANON = "sb_publishable_O4tCND6tdSJcppYZWBZ4NA_7nn7fhHI";

/* ---------- icons ---------- */
const I = {
  heart:'<path d="M12 21s-7-4.5-9.5-9A4.5 4.5 0 0 1 12 6a4.5 4.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9Z"/>',
  book:'<path d="M12 6.2C10.4 5.1 7.8 4.6 6 4.6V19c1.8 0 4.4.5 6 1.6 1.6-1.1 4.2-1.6 6-1.6V4.6c-1.8 0-4.4.5-6 1.6Z"/><path d="M12 6.2v14.4"/>',
  smile:'<circle cx="12" cy="12" r="9"/><path d="M8.5 14.5a4 4 0 0 0 7 0"/><path d="M9 9.5h.01M15 9.5h.01"/>',
  star:'<path d="m12 3.2 2.6 5.5 6 .6-4.5 4 1.3 5.9L12 21l-5.4 3.2 1.2-5.8-4.5-4 6-.6Z"/>',
  quote:'<path d="M9 7H5a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h2v1a2 2 0 0 1-2 2"/><path d="M19 7h-4a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h2v1a2 2 0 0 1-2 2"/>',
  pulse:'<path d="M3 12h4l2-6 4 12 2-6h6"/>',
  out:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
};
function ic(n,s){s=s||18;return '<svg viewBox="0 0 24 24" width="'+s+'" height="'+s+'" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+(I[n]||'')+'</svg>';}
const TYPES={note:{l:'Note',i:'book'},mood:{l:'Mood',i:'smile'},milestone:{l:'Milestone',i:'star'},quote:{l:'Quote',i:'quote'},health:{l:'Health',i:'pulse'}};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function initial(n){n=(n||'').trim();return n?n[0].toUpperCase():'?';}
function todayStr(){return new Date().toISOString().slice(0,10);}
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(s){if(!s)return'';const p=s.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);return MON[d.getMonth()]+' '+d.getDate();}

/* ---------- state ---------- */
let sb=null, session=null, household=null, profiles={}, moments=[], draftType='note';
const $=id=>document.getElementById(id);
const root=$('root');

/* ---------- boot ---------- */
function boot(){
  if(!SUPABASE_URL || !SUPABASE_ANON){
    $('cfgBanner').innerHTML='<div class="banner">Almost there \u2014 open <code>index.html</code> and paste your Supabase <code>URL</code> and <code>anon key</code> into the CONFIG block at the top.</div>';
    root.innerHTML=''; return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  sb.auth.getSession().then(({data})=>{ session=data.session; route(); });
  sb.auth.onAuthStateChange((_e,s)=>{ session=s; route(); });
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden && session && household) loadMoments().then(renderApp); });
}

/* ---------- router ---------- */
async function route(){
  if(!session){ renderLogin(); return; }
  root.innerHTML='<div class="center"><div class="spin"></div></div>';
  try{
    if(!household){ household = await resolveHousehold(); }
    if(!household){ renderOnboard(); return; }
    await Promise.all([loadProfiles(), loadMoments()]);
    renderApp();
  }catch(e){ renderError(e.message||String(e)); }
}

async function resolveHousehold(){
  const {data,error}=await sb.from('memberships').select('role, households(id,label,child_first_name,invite_code)');
  if(error) throw error;
  if(data && data.length && data[0].households){ return data[0].households; }
  return null;
}
async function loadProfiles(){
  const {data,error}=await sb.from('profiles').select('id,display_name');
  if(error) throw error;
  profiles={}; (data||[]).forEach(p=>profiles[p.id]=p.display_name||'Someone');
}
async function loadMoments(){
  const {data,error}=await sb.from('moments').select('*').eq('household_id',household.id)
    .order('occurred_on',{ascending:false}).order('created_at',{ascending:false});
  if(error) throw error; moments=data||[];
}

/* ---------- screens ---------- */
function brandRow(){return '<div class="brand"><div class="mark"><svg viewBox="0 0 24 24" width="16" height="16" fill="#F7F2E7" stroke="#F7F2E7" stroke-width="1.5">'+I.heart+'</svg></div><span class="name">tend</span><span class="tag">Kinship</span></div>';}

function renderLogin(){
  $('cfgBanner').innerHTML='';
  root.innerHTML='<div class="center">'+brandRow()
    +'<p class="lead" style="text-align:center;margin:4px 0 22px">A quiet place to keep the record of a hard, important chapter.</p>'
    +'<div class="card"><h1 style="font-size:22px;margin:0 0 4px">Sign in</h1>'
    +'<p class="lead tiny" style="margin:0">We\u2019ll email you a secure link \u2014 no password to remember.</p>'
    +'<label class="fld"><span>Email</span><input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@email.com"></label>'
    +'<button class="btn btn-primary btn-block" style="margin-top:18px" id="sendLink">Email me a sign-in link</button>'
    +'<div id="loginMsg"></div></div>'
    +'<p class="tiny faint" style="text-align:center;margin-top:18px;line-height:1.5">Your data is private to your family and protected at the database level.</p></div>';
  $('sendLink').onclick=sendLink;
  $('email').addEventListener('keydown',e=>{if(e.key==='Enter')sendLink();});
}
async function sendLink(){
  const email=($('email').value||'').trim();
  if(!email){ $('loginMsg').innerHTML='<div class="err">Enter your email first.</div>'; return; }
  const btn=$('sendLink'); btn.disabled=true; btn.textContent='Sending\u2026';
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.href.split('#')[0]}});
  btn.disabled=false; btn.textContent='Email me a sign-in link';
  if(error){ $('loginMsg').innerHTML='<div class="err">'+esc(error.message)+'</div>'; }
  else{ $('loginMsg').innerHTML='<div class="ok">Check your email and tap the link. You can close this tab \u2014 the link opens it back up, signed in.</div>'; }
}

function renderOnboard(){
  root.innerHTML='<div class="center">'+brandRow()
    +'<p class="lead" style="text-align:center;margin:4px 0 22px">One more step. Either start your family\u2019s space, or join one you\u2019ve been invited to.</p>'
    +'<div class="card"><h1 style="font-size:20px;margin:0 0 12px">Start a new space</h1>'
    +'<label class="fld"><span>Child\u2019s first name</span><input id="o_child" placeholder="e.g. Aria"></label>'
    +'<label class="fld"><span>Name this space <span class="faint" style="text-transform:none;letter-spacing:0">(optional)</span></span><input id="o_label" placeholder="Our family"></label>'
    +'<button class="btn btn-primary btn-block" style="margin-top:18px" id="createBtn">Create our space</button></div>'
    +'<div class="card" style="margin-top:12px"><h1 style="font-size:20px;margin:0 0 6px">Join with a code</h1>'
    +'<p class="lead tiny" style="margin:0 0 4px">If your partner already set yours up, enter their invite code.</p>'
    +'<label class="fld"><span>Invite code</span><input id="o_code" placeholder="e.g. 7F3A2C" style="text-transform:uppercase"></label>'
    +'<button class="btn btn-soft btn-block" style="margin-top:14px" id="joinBtn">Join</button></div>'
    +'<div id="onMsg"></div>'
    +'<button class="btn btn-ghost btn-block" style="margin-top:18px" id="signout2">Sign out</button></div>';
  $('createBtn').onclick=createHousehold;
  $('joinBtn').onclick=joinHousehold;
  $('signout2').onclick=signOut;
}
async function createHousehold(){
  const child=($('o_child').value||'').trim(), label=($('o_label').value||'').trim();
  const btn=$('createBtn'); btn.disabled=true; btn.textContent='Creating\u2026';
  const {data,error}=await sb.rpc('create_household',{p_label:label,p_child_first_name:child});
  if(error){ btn.disabled=false; btn.textContent='Create our space'; $('onMsg').innerHTML='<div class="err">'+esc(error.message)+'</div>'; return; }
  household=data; await Promise.all([loadProfiles(),loadMoments()]); renderApp();
}
async function joinHousehold(){
  const code=($('o_code').value||'').trim();
  if(!code){ $('onMsg').innerHTML='<div class="err">Enter the invite code.</div>'; return; }
  const btn=$('joinBtn'); btn.disabled=true; btn.textContent='Joining\u2026';
  const {data,error}=await sb.rpc('join_household',{p_code:code});
  if(error){ btn.disabled=false; btn.textContent='Join'; $('onMsg').innerHTML='<div class="err">'+esc(error.message)+'</div>'; return; }
  household=data; await Promise.all([loadProfiles(),loadMoments()]); renderApp();
}

function childName(){ return (household&&household.child_first_name)||'your child'; }
function meName(){ return profiles[session.user.id] || (session.user.email||'You').split('@')[0]; }

function renderApp(){
  $('cfgBanner').innerHTML='';
  root.innerHTML=
    '<header class="top"><div class="mark" style="width:28px;height:28px;border-radius:999px;background:var(--sage);display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="13" height="13" fill="#F7F2E7" stroke="#F7F2E7" stroke-width="1.5">'+I.heart+'</svg></div>'
    +'<span class="name">tend</span><div class="spacer"></div>'
    +'<button class="chip" id="inviteBtn">Invite</button>'
    +'<button class="chip" id="meChip"><span class="av">'+initial(meName())+'</span>'+esc(meName().split(' ')[0])+'</button></header>'
    +'<main>'
    +'<p class="eyebrow">'+esc(fmt(todayStr()))+'</p>'
    +'<h1 style="font-size:28px;margin:6px 0 0">'+esc(childName())+'.</h1>'
    +'<p class="lead" style="margin-top:8px">Her story and her record, kept by everyone on her side. Synced across your devices, private to your family.</p>'

    +'<div class="card" style="margin-top:18px">'
    +'<p class="eyebrow" style="color:var(--sage-deep)">Log a moment</p>'
    +'<div class="pickrow" id="typeRow">'+Object.keys(TYPES).map(k=>'<button class="pick'+(k==='note'?' on':'')+'" data-t="'+k+'">'+TYPES[k].l+'</button>').join('')+'</div>'
    +'<label class="fld" style="margin-top:14px"><span id="bodyLab">Notes</span><textarea id="m_body" placeholder="Anything worth remembering\u2026"></textarea></label>'
    +'<div id="moodWrap" style="display:none"><label class="fld"><span>How was she?</span><div class="pickrow" id="moodRow">'+['Great','Good','Okay','Off','Hard'].map((m,i)=>'<button class="pick'+(i===1?' on':'')+'" data-m="'+m+'">'+m+'</button>').join('')+'</div></label></div>'
    +'<div class="pickrow" style="margin-top:14px;align-items:center"><label class="fld" style="margin:0;flex:1"><span>Date</span><input id="m_date" type="date" value="'+todayStr()+'"></label></div>'
    +'<button class="btn btn-primary btn-block" style="margin-top:16px" id="addBtn">'+ic('plus',17)+'Save moment</button>'
    +'<div id="addMsg"></div></div>'

    +'<p class="section-label">Timeline</p><div id="list"></div>'
    +'</main>';

  draftType='note';
  $('typeRow').onclick=e=>{const b=e.target.closest('.pick');if(!b)return;[...$('typeRow').children].forEach(x=>x.classList.remove('on'));b.classList.add('on');draftType=b.dataset.t;
    $('moodWrap').style.display=draftType==='mood'?'block':'none';
    $('bodyLab').textContent=draftType==='quote'?'What did she say?':draftType==='health'?'What did you notice?':draftType==='milestone'?'What happened?':'Notes';};
  $('moodRow') && ($('moodRow').onclick=e=>{const b=e.target.closest('.pick');if(!b)return;[...$('moodRow').children].forEach(x=>x.classList.remove('on'));b.classList.add('on');});
  $('addBtn').onclick=addMoment;
  $('meChip').onclick=signOut;
  $('inviteBtn').onclick=showInvite;
  renderList();
}
function renderList(){
  const el=$('list'); if(!el) return;
  if(!moments.length){ el.innerHTML='<div class="empty"><p class="lead" style="margin:0">The first moment you log will appear here \u2014 and on every device signed into this space.</p></div>'; return; }
  el.innerHTML=moments.map(m=>{
    const t=TYPES[m.type]||TYPES.note; const who=profiles[m.created_by]||'Someone';
    return '<div class="moment"><div class="dot">'+ic(t.i,18)+'</div><div style="flex:1;min-width:0">'
      +'<span class="pill">'+t.l+(m.type==='mood'&&m.mood?' \u00b7 '+esc(m.mood):'')+'</span>'
      +(m.body?'<p style="font-size:14px;line-height:1.5;margin:8px 0 0'+(m.type==='quote'?';font-family:var(--serif);font-style:italic':'')+'">'+(m.type==='quote'?'\u201c':'')+esc(m.body)+(m.type==='quote'?'\u201d':'')+'</p>':'')
      +'<p class="tiny faint" style="margin-top:6px">'+esc(who.split(' ')[0])+' \u00b7 '+esc(fmt(m.occurred_on))+'</p></div></div>';
  }).join('');
}
async function addMoment(){
  const type=draftType, body=($('m_body').value||'').trim();
  let mood=null;
  if(type==='mood'){ const sel=document.querySelector('#moodRow .pick.on'); mood = sel ? sel.dataset.m : 'Good'; }
  const occurred_on=$('m_date').value||todayStr();
  if(!body && type!=='mood'){ $('addMsg').innerHTML='<div class="err">Add a few words first.</div>'; return; }
  const btn=$('addBtn'); btn.disabled=true; btn.textContent='Saving\u2026';
  const {error}=await sb.from('moments').insert({household_id:household.id,type,body,mood,occurred_on});
  btn.disabled=false; btn.innerHTML=ic('plus',17)+'Save moment';
  if(error){ $('addMsg').innerHTML='<div class="err">'+esc(error.message)+'</div>'; return; }
  $('m_body').value=''; $('addMsg').innerHTML='';
  await loadMoments(); renderList();
}
function showInvite(){
  const code=household.invite_code||'\u2014';
  const m=$('addMsg')||document.body;
  alert('Invite code for this space:\n\n   '+code+'\n\nHave your partner sign in, choose \u201cJoin with a code,\u201d and enter it. You\u2019ll both see the same records.');
}
async function signOut(){ await sb.auth.signOut(); household=null; moments=[]; profiles={}; session=null; renderLogin(); }

function renderError(msg){
  root.innerHTML='<div class="center"><div class="card"><h1 style="font-size:20px;margin:0 0 8px">Something went sideways</h1>'
    +'<p class="lead tiny" style="margin:0">'+esc(msg)+'</p>'
    +'<button class="btn btn-soft btn-block" style="margin-top:16px" onclick="location.reload()">Try again</button>'
    +'<button class="btn btn-ghost btn-block" style="margin-top:10px" id="soErr">Sign out</button></div></div>';
  const b=$('soErr'); if(b) b.onclick=signOut;
}

boot();
</script>
